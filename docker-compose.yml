version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AGENTMESH_ENV=production
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - chroma_data:/app/chroma_data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./index.html:/usr/share/nginx/html/index.html
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chroma_data:
