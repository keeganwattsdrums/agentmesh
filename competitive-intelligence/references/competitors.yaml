# Competitor Reference Data
# Baseline information for tracked competitors

competitors:
  - name: Mem0
    category: memory
    website: https://mem0.ai
    pricing_url: https://mem0.ai/pricing
    docs_url: https://docs.mem0.ai
    description: Memory layer for AI agents with long-term context awareness
    founded: "2024"
    funding: Y Combinator
    key_features:
      - Long-term memory for agents
      - Multi-user support
      - Context-aware retrieval
      - Memory graph visualization
      - Adaptive personalization
    pricing:
      - tier: Developer
        price: 0
        unit: free
        limits: 10k requests/month, 1M tokens
      - tier: Pro
        price: 29
        unit: month
        limits: 100k requests, priority support
      - tier: Enterprise
        price: null
        unit: custom
        limits: Unlimited, SLA, dedicated support
    integrations:
      - OpenAI
      - LangChain
      - LlamaIndex
      - Python/JS SDKs
    positioning: Developer-first memory infrastructure
    target_audience: AI agent builders, LLM application developers
    differentiators:
      - Simple API design
      - Memory graph visualization
      - Self-host option available
      - Multi-modal memory support

  - name: LangSmith
    category: observability
    website: https://smith.langchain.com
    pricing_url: https://smith.langchain.com/pricing
    docs_url: https://docs.smith.langchain.com
