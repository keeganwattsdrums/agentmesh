# Market overview
categories:
  memory:
    description: Long-term memory and context management for AI agents
    key_players: [Mem0]
    market_stage: Emerging
  observability:
    description: Monitoring, tracing, and evaluation for LLM applications
    key_players: [LangSmith, Weights & Biases, Arize]
    market_stage: Growing
  vector-db:
    description: Vector databases for embeddings and semantic search
    key_players: [Pinecone, Chroma, Weaviate, Milvus, Qdrant]
    market_stage: Mature
  agent-framework:
    description: Frameworks for building and orchestrating AI agents
    key_players: [AutoGen, CrewAI, LangGraph, LlamaIndex]
    market_stage: Rapid growth
