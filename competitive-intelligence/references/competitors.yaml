    founded: "2023"
    funding: LangChain Inc (Series A)
    key_features:
      - Trace logging and debugging
      - Prompt management and versioning
      - Evaluation datasets
      - A/B testing
      - Cost tracking
      - Feedback collection
    pricing:
      - tier: Developer
        price: 0
        unit: free
        limits: 5k traces/month
      - tier: Plus
        price: 39
        unit: user/month
        limits: 10k traces, prompt playground
      - tier: Enterprise
        price: null
        unit: custom
        limits: Unlimited, SSO, audit logs
    integrations:
      - LangChain (native)
      - OpenAI
      - Anthropic
      - Custom endpoints
    positioning: Enterprise observability for LLM applications
    target_audience: LangChain users, enterprise AI teams
    differentiators:
      - Native LangChain integration
      - Built-in evaluation framework
      - Cost tracking by model/chain
      - Prompt versioning and collaboration

