# Example Test: Password Reset Help
test:
  id: support_001
  name: "Agent provides password reset instructions"
  category: integration
  priority: critical

input:
  message: "I forgot my password and can't log in"

expected:
  assertions:
    - type: contains
      value: "reset"
      case_sensitive: false
    
    - type: contains_any
      values: ["email", "link", "instructions", "steps"]
    
    - type: not_contains
      value: "I cannot help"
    
    - type: semantic_similarity
      reference: "Providing step-by-step instructions for password reset"
      threshold: 0.80
    
    - type: llm_eval
      prompt: "Does this response provide helpful, actionable steps to reset a password?"
      expected: "yes"